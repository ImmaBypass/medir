<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Problemas Mentales</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#0f172a;
--accent1:#6366f1;
--accent2:#ec4899;
}

body.dark{
--bg:#0b0f19;
--card:#111827;
--text:#e5e7eb;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:.4s;
}

body::before{
content:"";
position:fixed;
width:150%;height:150%;
background:radial-gradient(circle at 20% 20%, rgba(99,102,241,.2), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(236,72,153,.2), transparent 40%);
animation:bgMove 25s infinite alternate ease-in-out;
z-index:-1;
}
@keyframes bgMove{0%{transform:translate(0,0)}100%{transform:translate(-40px,40px)}}

h1{font-size:40px;font-weight:800;margin-bottom:30px}
h2{margin-bottom:15px;letter-spacing:1px}

.container{display:flex;flex-direction:column;align-items:center}

.btn{
width:220px;height:65px;border-radius:50px;border:none;
font-size:18px;font-weight:600;cursor:pointer;
transition:.25s;
}

.play{
background:linear-gradient(135deg,var(--accent1),var(--accent2));
color:white;box-shadow:0 8px 25px rgba(0,0,0,.2);
}

.play:hover{transform:scale(1.05)}

.config{
margin-top:10px;background:transparent;border:2px solid var(--text);
color:var(--text);
}

body.dark .config{border:2px solid #fff}

.toggle{position:absolute;top:20px;right:25px;font-size:22px;cursor:pointer}

.back{
position:absolute;
top:18px;
left:18px;
width:36px;height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:rgba(0,0,0,0.05);
transition:.3s;
}

body.dark .back{background:rgba(255,255,255,0.1)}

.back svg{
width:18px;height:18px;
stroke:var(--text);
stroke-width:2.5;
}

.back:hover{transform:scale(1.15) rotate(90deg)}

.card{
width:560px;
height:430px;
background:var(--card);
border-radius:20px;
padding:25px;
overflow-y:auto;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{
background:linear-gradient(var(--accent1),var(--accent2));
border-radius:20px;
}

.item{margin-bottom:22px}
.item label{
font-size:13px;
font-weight:600;
display:block;
margin-bottom:6px;
}

.row{display:flex;align-items:center;gap:10px}

.value{
width:40px;
text-align:right;
font-size:12px;
font-weight:700;
}

input[type=range]{
flex:1;
height:8px;
border-radius:20px;
appearance:none;
background:linear-gradient(90deg,var(--accent1),var(--accent2));
}

input[type=range]::-webkit-slider-thumb{
appearance:none;
width:16px;height:16px;
border-radius:50%;
background:#fff;
border:2px solid #000;
cursor:pointer;
}

.hidden{display:none}

.alert{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border-radius:20px;
background:linear-gradient(135deg,var(--accent1),var(--accent2));
color:white;
font-size:14px;
animation:fadeAlert 1s forwards;
}

@keyframes fadeAlert{
0%{opacity:0;transform:translate(-50%,-10px)}
20%{opacity:1}
80%{opacity:1}
100%{opacity:0;transform:translate(-50%,-10px)}
}
</style>
</head>

<body>

<div class="toggle" id="toggle">🌙</div>

<div class="back hidden" id="back">
<svg viewBox="0 0 24 24" fill="none">
<path d="M18 6L6 18M6 6L18 18"/>
</svg>
</div>

<div class="container" id="menu">
<h1>Medidor de Problemas Mentales</h1>
<button class="btn play" id="start">▶</button>
<button class="btn config" id="config">CONFIGURACIÓN</button>
</div>

<div class="container hidden" id="app">
<h2>MEDIDOR</h2>
<div class="card" id="card"></div>
</div>

<script>

"Sífilis","Gonorrea","Herpes","VPH",
"Endometriosis","Síndrome premenstrual","Menopausia",
"Disfunción eréctil","Infertilidad",
"Escoliosis","Hernia discal","Lumbalgia","Ciática",

/* 🧩 EXISTENCIALES / PSICOLÓGICOS REALES */
"Crisis existencial","Falta de propósito","Vacío emocional",
"Soledad crónica","Ansiedad existencial","Miedo a la muerte",
"Nihilismo","Desmotivación","Procrastinación",
"Auto-sabotaje","Baja autoestima","Dependencia emocional",
"Falta de disciplina","Falta de identidad","Confusión moral",
"Falta de sentido vital","Desconexión social","Aislamiento emocional",
"Inseguridad","Comparación constante","Perfeccionismo",
"Síndrome del impostor","Indecisión crónica","Falta de dirección",
"Desesperanza","Pesimismo crónico","Falta de ambición",
"Desorganización mental","Saturación mental","Agotamiento emocional"
];

</script>

<script>
const start=document.getElementById("start");
const menu=document.getElementById("menu");
const app=document.getElementById("app");
const card=document.getElementById("card");
const back=document.getElementById("back");

start.onclick=()=>{
menu.classList.add("hidden");
app.classList.remove("hidden");
back.classList.remove("hidden");
create();
}

back.onclick=()=>{
app.classList.add("hidden");
menu.classList.remove("hidden");
back.classList.add("hidden");
}

function create(){
card.innerHTML="";
disorders.forEach(d=>{
let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<label>${d}</label>
<div class="row">
<input type="range" min="0" max="100" value="0">
<div class="value">0</div>
</div>`;

let slider=div.querySelector("input");
let val=div.querySelector(".value");

slider.oninput=()=>val.textContent=slider.value;

card.appendChild(div);
});
}

document.getElementById("config").onclick=()=>{
let a=document.createElement("div");
a.className="alert";
a.textContent="En desarrollo";
document.body.appendChild(a);
setTimeout(()=>a.remove(),1000);
}

const toggle=document.getElementById("toggle");
let dark=false;
toggle.onclick=()=>{
dark=!dark;
document.body.classList.toggle("dark");
toggle.textContent=dark?"☀️":"🌙";
}
</script>

</body>
</html>
