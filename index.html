<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor Mental PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--bg:#f5f5f7;--card:#ffffff;--text:#111;--accent1:#7b2ff7;--accent2:#f107a3}
body.dark{--bg:#0f0f12;--card:#1a1a1f;--text:#fff}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:.4s}
body::before{content:"";position:fixed;width:150%;height:150%;background:radial-gradient(circle at 20% 20%, rgba(123,47,247,.25), transparent 40%),radial-gradient(circle at 80% 80%, rgba(241,7,163,.25), transparent 40%);animation:floatBg 14s infinite alternate ease-in-out;z-index:-1}
@keyframes floatBg{0%{transform:translate(0,0)}100%{transform:translate(-60px,60px)}}
.container{display:flex;gap:30px}
.panel{text-align:center}
h1{font-size:40px;font-weight:800;margin-bottom:40px}
h2{margin-bottom:15px}
.btn{width:220px;height:70px;border-radius:50px;border:none;cursor:pointer;font-size:20px;font-weight:600;transition:.25s}
.play{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;box-shadow:0 10px 25px rgba(0,0,0,.2)}
.play:hover{transform:scale(1.07) rotate(1deg);filter:hue-rotate(20deg)}
.play:active{transform:scale(.95)}
.config{margin-top:15px;background:transparent;border:2px solid var(--text)}
.config:hover{transform:scale(1.05)}
.toggle{position:absolute;top:20px;right:25px;font-size:22px;cursor:pointer}
.card{width:520px;height:420px;background:var(--card);border-radius:25px;padding:25px;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.15);scroll-behavior:smooth}
.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2));border-radius:10px}
.slider{margin-bottom:22px}
.slider label{font-size:12px;font-weight:700}
input[type=range]{width:100%;height:14px;border-radius:20px;appearance:none;margin-top:6px;background:linear-gradient(90deg,var(--accent1),var(--accent2));transition:.3s}
input[type=range]:hover{filter:brightness(1.1)}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:white;border:3px solid #000;cursor:pointer}
.range-values{display:flex;justify-content:space-between;font-size:11px;opacity:.6}
.side{width:220px;height:420px;background:var(--card);border-radius:20px;padding:15px;overflow:auto;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.value-item{font-size:11px;margin-bottom:8px;display:flex;justify-content:space-between}
.hidden{display:none}
</style>
</head>
<body>
<div class="toggle" id="toggle">🌙</div>

<div class="panel" id="menu">
<h1>Medidor de<br>Problemas Mentales</h1>
<button class="btn play" id="start">▶</button><br>
<button class="btn config">CONFIGURACION</button>
</div>

<div class="container hidden" id="app">
<div>
<h2>MEDIDOR</h2>
<div class="card" id="card"></div>
</div>
<div class="side" id="side"><h3>VALORES</h3></div>
</div>

<script>
const start=document.getElementById("start");
const menu=document.getElementById("menu");
const app=document.getElementById("app");
const card=document.getElementById("card");
const side=document.getElementById("side");

start.onclick=()=>{menu.classList.add("hidden");app.classList.remove("hidden");create();}

// BASE REAL
const baseMental=[
"Autismo","Esquizofrenia","TDAH","TOC","Depresión","Ansiedad","Bipolaridad","TEPT",
"Fobia social","Pánico","Insomnio","Adicciones","Trastorno límite","Trastorno narcisista"
];

// GENERADOR MASIVO
function generateMassive(){
let list=[...baseMental];

// generar 1000+ variaciones
const extras=["leve","moderado","severo","crónico","intermitente","social","cognitivo","emocional"];

for(let i=0;i<1200;i++){
let base=baseMental[i%baseMental.length];
let extra=extras[i%extras.length];
list.push(base+" ("+extra+" "+i+")");
}

// añadir otras categorías al final
const other=[
"Miopía","Fatiga","Dolor crónico","Migrañas","Problemas digestivos",
"Crisis existencial","Falta de propósito","Sobrepensar","Procrastinación"
];

return list.concat(other);
}

const disorders = [
// ================= MENTALES (AMPLIA LISTA REAL) =================
"Autismo","Síndrome de Asperger","Esquizofrenia","Trastorno esquizoafectivo","TDAH","TOC","Depresión mayor","Distimia","Ansiedad generalizada","Trastorno de pánico","Fobia social","Agorafobia","Trastorno bipolar I","Trastorno bipolar II","Trastorno ciclotímico","Trastorno límite de la personalidad","Trastorno narcisista","Trastorno antisocial","Trastorno evitativo","Trastorno dependiente","Trastorno paranoide","Trastorno histriónico","Trastorno esquizotípico","Trastorno disociativo","Amnesia disociativa","Fuga disociativa","Despersonalización","TEPT","TEPT complejo","Trastorno de adaptación","Insomnio","Hipersomnia","Narcolepsia","Parasomnias","Apnea del sueño","Anorexia","Bulimia","Trastorno por atracón","Pica","Rumiación","Adicción al alcohol","Adicción a opioides","Adicción a cannabis","Adicción a cocaína","Adicción a estimulantes","Adicción a videojuegos","Adicción a internet","Adicción al móvil","Adicción al sexo","Adicción al trabajo","Trastorno explosivo intermitente","Cleptomanía","Piromanía","Tricotilomanía","Dermatilomanía","Mutismo selectivo","Trastorno del lenguaje","Dislexia","Discalculia","Dispraxia","Trastorno del procesamiento sensorial","Trastorno oposicionista desafiante","Trastorno de conducta","Trastorno facticio","Hipocondría","Somatización","Trastorno de conversión","Trastorno de identidad","Trastorno de desregulación emocional","Estrés agudo","Fatiga mental","Burnout","Apatía","Abulia","Anhedonia","Alexitimia","Pensamientos intrusivos","Rumiación mental","Paranoia leve","Inseguridad social","Dependencia emocional","Celos patológicos","Baja autoestima","Perfeccionismo extremo","Procrastinación crónica","Impulsividad","Ira incontrolada","Inestabilidad emocional","Sensibilidad emocional extrema","Desconexión emocional","Vacío emocional",

// ================= MÉDICOS =================
"Miopía","Hipermetropía","Astigmatismo","Presbicia","Daltonismo","Cataratas","Glaucoma","Degeneración macular","Ceguera","Dolor crónico","Fibromialgia","Migrañas","Cefalea tensional","Dolor lumbar","Hernia discal","Escoliosis","Fatiga crónica","Síndrome de fatiga crónica","Diabetes tipo 1","Diabetes tipo 2","Hipertensión","Hipotensión","Colesterol alto","Obesidad","Desnutrición","Hipotiroidismo","Hipertiroidismo","Síndrome metabólico","Anemia","Problemas digestivos","Reflujo gastroesofágico","Gastritis","Úlcera","Síndrome del intestino irritable","Enfermedad de Crohn","Colitis ulcerosa","Alergias","Asma","Bronquitis","EPOC","Problemas cardíacos","Arritmias","Insuficiencia cardíaca","Infarto previo","Problemas renales","Insuficiencia renal","Cálculos renales","Problemas hepáticos","Hepatitis","Cirrosis","Dolor muscular","Debilidad muscular","Artritis","Osteoartritis","Osteoporosis","Problemas articulares","Lesiones deportivas","Infecciones recurrentes","Sistema inmune debilitado","Insomnio físico","Apnea del sueño","Problemas hormonales","Síndrome premenstrual severo","Endometriosis",

// ================= EXISTENCIALES / PSICOSOCIALES =================
"Crisis existencial","Falta de propósito","Sentido de la vida","Miedo a la muerte","Ansiedad existencial","Vacío existencial","Sobrepensar","Procrastinación","Duda constante","Indecisión","Miedo al futuro","Incertidumbre constante","Frustración crónica","Insatisfacción vital","Falta de dirección","Desmotivación general","Pérdida de sentido","Comparación social","Aislamiento social","Soledad","Falta de identidad","Crisis de identidad","Alienación","Desrealización","Dependencia digital","Sobrecarga de información","Desconexión social","Falta de pertenencia","Falta de reconocimiento","Presión social","Autoexigencia extrema","Falta de disciplina","Conflicto interno","Dissonancia cognitiva","Falta de coherencia personal","Desorientación vital","Falta de metas","Desesperanza","Pesimismo extremo"
];

function create(){
card.innerHTML="";
side.innerHTML="<h3>VALORES</h3>";

disorders.forEach((d,i)=>{
let div=document.createElement("div");
div.className="slider";

div.innerHTML=`
<label>${d}</label>
<input type="range" min="0" max="100" value="0" data-id="${i}">
<div class="range-values"><span>0</span><span>100</span></div>`;

card.appendChild(div);

let val=document.createElement("div");
val.className="value-item";
val.id="v"+i;
val.innerHTML=`<span>${d}</span><span>0</span>`;
side.appendChild(val);
});

card.querySelectorAll("input").forEach(sl=>{
sl.addEventListener("input",e=>{
let id=e.target.dataset.id;
document.querySelector("#v"+id+" span:last-child").textContent=e.target.value;
});
});
}

// DARK
const toggle=document.getElementById("toggle");
let dark=false;
toggle.onclick=()=>{dark=!dark;document.body.classList.toggle("dark");toggle.textContent=dark?"☀️":"🌙"}

// COLOR SOLO BOTONES
let hue=260;
document.querySelectorAll(".btn").forEach(btn=>{
btn.addEventListener("mouseenter",()=>{
hue+=20;
document.documentElement.style.setProperty('--accent1',`hsl(${hue},70%,55%)`);
document.documentElement.style.setProperty('--accent2',`hsl(${hue+60},70%,55%)`);
});
});
</script>
</body>
</html>
